version: '3.9'

# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up

services:

  angular:
    image: ghcr.io/ruralxperience/web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      API_BASE_URL: https://api.ruralxperience.com/api/v1
      WS_BASE_URL: wss://api.ruralxperience.com
      APP_VERSION: ${IMAGE_TAG:-unknown}

  spring-boot:
    image: ghcr.io/ruralxperience/api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ruralxperience
      SPRING_DATASOURCE_USERNAME: ${DB_USER}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      SPRING_PROFILES_ACTIVE: prod

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    entrypoint: >
      sh -c "trap exit TERM;
             while :; do
               certbot renew;
               sleep 12h & wait $${!};
             done;"

  nginx-ssl:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx-ssl.conf:/etc/nginx/nginx.conf:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - angular

volumes:
  certbot_certs:
  certbot_www:
