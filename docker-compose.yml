version: '3.9'

services:

  # PostgreSQL database
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ruralxperience
      POSTGRES_USER: rxp_user
      POSTGRES_PASSWORD: rxp_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U rxp_user -d ruralxperience" ]
      interval: 10s
      retries: 5

  # Redis for session caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Spring Boot API
  spring-boot:
    build:
      context: ../ruralxperience-api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/ruralxperience
      SPRING_DATASOURCE_USERNAME: rxp_user
      SPRING_DATASOURCE_PASSWORD: rxp_password
      SPRING_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8080/actuator/health" ]
      interval: 30s
      retries: 5

  # Angular frontend
  angular:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    environment:
      API_BASE_URL: http://localhost:8080/api/v1
      WS_BASE_URL: ws://localhost:8080
      APP_VERSION: dev
    depends_on:
      spring-boot:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
