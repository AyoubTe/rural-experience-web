<h2 mat-dialog-title>
  @if (data.danger) {
    <mat-icon color="warn">warning</mat-icon>
  }
  {{ data.title }}
</h2>

<mat-dialog-content>
  <p>{{ data.message }}</p>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button [mat-dialog-close]="false">
    {{ data.cancelText }}
  </button>
  <button mat-flat-button
          [color]="data.danger ? 'warn' : 'primary'"
          [mat-dialog-close]="true">
    {{ data.confirmText }}
  </button>
</mat-dialog-actions>
