<div class="hero">
  <div class="hero__content">
    <p class="hero__tagline" i18n="@@hero.tagline">Authentic Rural Experiences</p>
    <h1 class="hero__title" i18n="@@hero.title">
      Discover the countryside,<br>one farm at a time
    </h1>
    <p class="hero__description" i18n="@@hero.description">
      Connect with rural hosts across France offering
      immersive farm stays, fishing trips, artisan workshops,
      and harvest experiences.
    </p>
    <a class="hero__cta" href="/experiences" i18n="@@hero.ctaBtn">
      Explore Experiences
    </a>
  </div>
  <div class="hero__image">
    <div class="hero__image-placeholder">
      <img ngSrc="public/logo.png" alt="rxp" i18n-alt="@@hero.logoAlt" height="100" width="100">
    </div>
  </div>
</div>
