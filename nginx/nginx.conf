worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Logging format
  log_format main '$remote_addr - $remote_user [$time_local] '
    '"$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  sendfile       on;
  tcp_nopush     on;
  keepalive_timeout 65;

  # Gzip compression
  gzip on;
  gzip_types
    text/plain text/css application/json
    application/javascript application/x-javascript
    text/xml application/xml application/xml+rss
    text/javascript image/svg+xml;
  gzip_min_length 256;
  gzip_comp_level 6;
  gzip_vary on;

  # Security headers
  add_header X-Frame-Options        "SAMEORIGIN"  always;
  add_header X-Content-Type-Options "nosniff"     always;
  add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy     "camera=(), microphone=(), geolocation=()" always;

  # Content Security Policy (tighten for production)
  add_header Content-Security-Policy
    "default-src 'self'; "
    "script-src 'self'; "
    "style-src 'self' 'unsafe-inline' fonts.googleapis.com; "
    "font-src 'self' fonts.gstatic.com; "
    "img-src 'self' data: https://ruralxperience.imgix.net; "
    "connect-src 'self' wss://api.ruralxperience.com; "
    always;

  # ── English locale ─────────────────────────────────────────────
  server {
    listen 80;
    server_name ruralxperience.com www.ruralxperience.com;

    root /usr/share/nginx/html/en-GB;
    index index.html;

    # Hashed assets: cache for 1 year
    location ~* \.(js|css|woff2?|ttf|eot|svg|ico|webmanifest)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # index.html: no cache (so new deployments take effect immediately)
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # API proxy — forwards to Spring Boot
    location /api/ {
      proxy_pass         http://spring-boot:8080;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 60s;
    }

    # WebSocket proxy
    location /ws {
      proxy_pass         http://spring-boot:8080;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;
    }

    # Client-side routing: all other URLs serve index.html
    location / {
      try_files $uri $uri/ /index.html;
    }
  }

  # ── French locale ──────────────────────────────────────────────
  server {
    listen 80;
    server_name ruralxperience.com www.ruralxperience.com;

    # Redirect /fr/* to French build
    location /fr/ {
      root  /usr/share/nginx/html;
      alias /usr/share/nginx/html/fr/;

      location ~* \.(js|css|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
      }

      try_files $uri $uri/ /fr/index.html;
    }
  }
}
