events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;
  sendfile on;
  gzip on;
  gzip_types text/plain text/css application/json application/javascript;

  # Redirect HTTP to HTTPS
  server {
    listen 80;
    server_name ruralxperience.com www.ruralxperience.com;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # HTTPS server
  server {
    listen 443 ssl http2;
    server_name ruralxperience.com www.ruralxperience.com;

    ssl_certificate /etc/letsencrypt/live/ruralxperience.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ruralxperience.com/privkey.pem;

    # Modern TLS configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS: tell browsers to always use HTTPS for 1 year
    add_header Strict-Transport-Security
      "max-age=31536000; includeSubDomains; preload" always;

    root /usr/share/nginx/html/en-GB;
    index index.html;

    location ~* \.(js|css|woff2?|webmanifest)$ {
      expires 1y;
      add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location = /index.html {
      add_header Cache-Control "no-cache";
    }

    location /api/ {
      proxy_pass http://spring-boot:8080;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /ws {
      proxy_pass http://spring-boot:8080;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_read_timeout 3600s;
    }

    location /fr/ {
      alias /usr/share/nginx/html/fr/;
      try_files $uri $uri/ /fr/index.html;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
